# ============================================================
# Ensemble - Docker Compose for Full Stack
# ============================================================
# Usage:
#   docker compose up -d          # Start all services
#   docker compose down           # Stop all services
#   docker compose logs -f        # View logs
#   docker compose up --build     # Rebuild and start
# ============================================================

version: "3.8"

services:
  # ----------------------------------------------------------
  # Backend: FastAPI + Uvicorn
  # ----------------------------------------------------------
  ensemble-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ensemble-backend
    ports:
      - "8088:8088"
    env_file:
      - .env
    environment:
      - CORS_ORIGINS=http://localhost:3000,http://localhost:8080,http://ensemble-ui:3000
      - WORKSPACE_DIR=/app/data/workspace
    volumes:
      # Persist user data across container restarts
      - ensemble-data:/app/data
      # Mount code for development (comment out for production)
      # - ./core:/app/core:ro
      # - ./execution:/app/execution:ro
      # - ./skills:/app/skills:ro
      # - ./directives:/app/directives:ro
    depends_on:
      - ensemble-healthcheck
    restart: unless-stopped
    networks:
      - ensemble-network
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  # ----------------------------------------------------------
  # Frontend: React + Tauri (UI)
  # ----------------------------------------------------------
  ensemble-ui:
    build:
      context: ./ui
      dockerfile: Dockerfile.ui
    container_name: ensemble-ui
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8088
      - VITE_WS_URL=ws://localhost:8088
    depends_on:
      - ensemble-backend
    restart: unless-stopped
    networks:
      - ensemble-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # ----------------------------------------------------------
  # Healthcheck: Wait for backend to be ready
  # ----------------------------------------------------------
  ensemble-healthcheck:
    image: alpine:3.18
    container_name: ensemble-healthcheck
    command: >
      sh -c "
        echo 'Waiting for backend to be ready...' &&
        for i in $(seq 1 30); do
          if wget -qO- http://ensemble-backend:8088/health 2>/dev/null; then
            echo 'Backend is ready!' &&
            exit 0
          fi
          echo 'Waiting... ($i/30)'
          sleep 2
        done &&
        echo 'Backend not ready after 60 seconds' &&
        exit 1
      "
    networks:
      - ensemble-network
    profiles:
      - healthcheck

# ----------------------------------------------------------
# Named volumes for persistent data
# ----------------------------------------------------------
volumes:
  ensemble-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data

# ----------------------------------------------------------
# Networks
# ----------------------------------------------------------
networks:
  ensemble-network:
    driver: bridge
    name: ensemble-network

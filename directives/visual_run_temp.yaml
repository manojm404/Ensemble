name: Visual SOP Export
description: Generated from Ensemble Studio Canvas
states:
  design_portfolio_card_description:
    role: content_creator
    instruction: 'As a designer, write a short, detailed description of a modern portfolio card for a fictional AI artist named ''Nova''. The description must include: a profile image placeholder, Nova''s name, title (''AI Artist & Creative Technologist''), a two-sentence bio, social media icons (Twitter, GitHub, LinkedIn), and a ''View Work'' button. Describe the card''s aesthetic as a dark glassmorphic style with neon blue/purple accents, rounded corners, and a subtle grid background. Focus purely on the visual and structural description; do not include any code.'
    tools: []
    transitions:
      - to: develop_portfolio_card_webpage
        condition: task_complete
  develop_portfolio_card_webpage:
    role: default_agent
    instruction: As a developer, based *exactly* on the design description provided by Agent 1, write the complete HTML/CSS/JS code for the personal portfolio card webpage. The page must be fully responsive, include hover effects for the 'View Work' button and social icons, and embed the 'Space Grotesk' Google Font. The final output must be a single, self-contained HTML file that is ready to run in any browser and beautifully displays the portfolio card.
    tools: []
    transitions:
      - to: end
        condition: task_complete
  end:
    role: System
    instruction: Process complete.
    transitions: []

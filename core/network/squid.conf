# Default Squid configuration for Ensemble Sovereign Edge
# Allow DNS
dns_v4_first on

# Egress Whitelist
acl whitelist_domains dstdomain .openai.com .google.com .anthropic.com .github.com

# Standard Ports
acl Safe_ports port 80 443
http_access deny !Safe_ports

# Allow Whitelist, Deny All else
http_access allow whitelist_domains
http_access deny all

# Transparent and Logging
http_port 3128
access_log stdio:/var/log/squid/access.log